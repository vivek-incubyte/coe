name: Run tests on PR

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5555/task_management_test
      JWT_SECRET: test-secret

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_management_test

        ports:
          - 5555:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: task-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: task-management/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run tests
        run: pnpm test

  format:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: task-management/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Check Format
        run: pnpm format:check

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: task-management/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Check Lint
        run: pnpm lint:check

  typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: task-management/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Check Typescript types
        run: pnpm typecheck

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: task-management/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Create Build
        run: pnpm build
